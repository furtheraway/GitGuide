<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Example Git workflow</title>
  <desc id="desc">A simple Git workflow showing main, a feature branch, a pull request, review, and merge back to main.</desc>
  <defs>
    <style>
      .bg { fill: #f7f4ee; }
      .panel { fill: #fffdf8; stroke: #d8cfc1; stroke-width: 2; rx: 18; }
      .main-line { stroke: #245c4a; stroke-width: 8; fill: none; stroke-linecap: round; }
      .feature-line { stroke: #c7682d; stroke-width: 8; fill: none; stroke-linecap: round; }
      .merge-line { stroke: #245c4a; stroke-width: 8; fill: none; stroke-linecap: round; }
      .node-main { fill: #245c4a; }
      .node-feature { fill: #c7682d; }
      .node-merge { fill: #1e3f66; }
      .label { font: 600 26px "Segoe UI", Arial, sans-serif; fill: #2a241d; }
      .small { font: 500 20px "Segoe UI", Arial, sans-serif; fill: #4a433a; }
      .title { font: 700 34px "Segoe UI", Arial, sans-serif; fill: #1f1a15; }
      .badge-main { fill: #d9efe5; stroke: #245c4a; stroke-width: 1.5; rx: 12; }
      .badge-feature { fill: #fde2d2; stroke: #c7682d; stroke-width: 1.5; rx: 12; }
      .badge-review { fill: #dce9f8; stroke: #1e3f66; stroke-width: 1.5; rx: 12; }
      .arrow { stroke: #6a6258; stroke-width: 2.5; marker-end: url(#arrowhead); fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#6a6258"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="520"/>
  <rect class="panel" x="40" y="40" width="1120" height="440"/>

  <text class="title" x="80" y="95">Example: branch, pull request, review, merge</text>

  <rect class="badge-main" x="82" y="124" width="88" height="34"/>
  <text class="small" x="103" y="147">main</text>
  <rect class="badge-feature" x="186" y="124" width="156" height="34"/>
  <text class="small" x="208" y="147">feature/login</text>
  <rect class="badge-review" x="358" y="124" width="124" height="34"/>
  <text class="small" x="387" y="147">GitHub PR</text>

  <path class="main-line" d="M120 320 H1020"/>
  <circle class="node-main" cx="170" cy="320" r="13"/>
  <circle class="node-main" cx="310" cy="320" r="13"/>
  <circle class="node-main" cx="470" cy="320" r="13"/>
  <circle class="node-merge" cx="760" cy="320" r="15"/>
  <circle class="node-main" cx="920" cy="320" r="13"/>

  <path class="feature-line" d="M310 320 C360 260, 430 220, 520 220 H700"/>
  <circle class="node-feature" cx="430" cy="255" r="13"/>
  <circle class="node-feature" cx="560" cy="220" r="13"/>
  <circle class="node-feature" cx="690" cy="220" r="13"/>

  <path class="merge-line" d="M690 220 C720 230, 742 255, 760 320"/>

  <text class="label" x="120" y="360">Stable shared history</text>
  <text class="label" x="420" y="198">Focused feature work</text>
  <text class="label" x="720" y="196">Reviewed and merged</text>

  <path class="arrow" d="M560 185 C615 165, 680 160, 738 185"/>
  <text class="small" x="594" y="160">Open pull request</text>

  <path class="arrow" d="M760 170 C760 205, 760 245, 760 285"/>
  <text class="small" x="785" y="235">Merge after review</text>

  <text class="small" x="140" y="292">Existing commits</text>
  <text class="small" x="395" y="292">Branch from main</text>
  <text class="small" x="842" y="292">Continue on main</text>

  <text class="small" x="398" y="245">Commit</text>
  <text class="small" x="530" y="210">Commit</text>
  <text class="small" x="660" y="210">Commit</text>
</svg>
